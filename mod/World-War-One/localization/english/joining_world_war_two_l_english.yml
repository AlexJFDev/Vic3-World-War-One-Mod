 joining_world_war_events.39.t:0 "It was not the last war afterall ..."
 joining_world_war_events.39.d:0 "A major conflict has erupted in Europe and is quickly spiraling into a devastating total war."
 joining_world_war_events.39.f:0 "The situation in Europe has descended again into a generalized conflict. The recent technological advancments of those past years are driving the war into unforseen developments. Many countries are taken by suprise as mechanized warfare made defensive tactics obsolete. The level of devastation is expected to surpass the Great War. Nonetheless, our elites and people are waiting for us to make a choice."
 joining_world_war_events.39.a:0 "We'll see how the war unfolds."

 joining_world_war_events.40.t:0 "The Nation Supports The Allies"
 joining_world_war_events.40.d:0 "Public support is now more than enough to join the coalition. It is up to us to make the final decision."
 joining_world_war_events.40.f:0 "After long deliberation and debates, the concensus point towards the support of the Allies. We have now enough momentum to proceed and join the war."
 joining_world_war_events.40.a:0 "Join the Allies."
 joining_world_war_events.40.b:0 "Maybe not afterall ..."

 joining_world_war_events.41.t:0 "The Nation Supports The Axis"
 joining_world_war_events.41.d:0 "Public support is now more than enough to join the coalition. It is up to us to make the final decision."
 joining_world_war_events.41.f:0 "After long deliberation and debates, the concensus point towards the support of the Axis. We have now enough momentum to proceed and join the war."
 joining_world_war_events.41.a:0 "Join the Axis."
 joining_world_war_events.41.b:0 "Maybe not afterall ..."

 joining_world_war_events.42.t:0 "The Matter of Italy"
 joining_world_war_events.42.d:0 "Italy has decided to remained neutral for now. We could propose them lands in exchange for their support."
 joining_world_war_events.42.f:0 "The kingdom of Italy has been close to us those past decades. Under the Tripple Alliance we have signed with them, they were supposed to help us in our war effort, but decided not to, claiming that we are the aggressor in this situation. Despite this betrayal, we desperatly need all support we can rally. The only way we could sway them would be to give them our territories that they claim. This would definitly make them enter the war, but this we would have to give up our precious lands ! Whats should we do ?"
 joining_world_war_events.42.a:0 "We cannot trade our lands like that !"
 joining_world_war_events.42.b:0 "Propose them Tyrol and Istria."

 joining_world_war_events.43.t:0 "Vienna Makes an Offer"
 joining_world_war_events.43.d:0 "Austria-Hungary proposes to give us Tyrol and Istria if we join their war. Should we accept ?"
 joining_world_war_events.43.f:0 "For too long those territories have been held by Vienna while many of our Italian brothers live there. Even though we also claim Dalmatia, we must recognize that the Austro-Hungarian empire is making a good offer that would help us finish our unification. We would have to join this terrible war, but if we suceed we will have even more lands to take from the Entente."
 joining_world_war_events.43.a:0 "Declare war on the Entente"
 joining_world_war_events.43.b:0 "Let's stay out of this."