l_english:

 brazil_events.1.t:0 "The Fragile Oligarchy"
 brazil_events.1.d:0 "Our regime is torned appart by elites infighting and increasing opposition. We must reform our face the end of the oligarchy."
 brazil_events.1.f:0 "Since the peacefull coup d'état of 1889, power has been consolidated in the arms of the landowners. Organized under the principles of coronelism, the Republic has managed to survive, but is now facing multiple crisis. Landowners from different regions are now competing for dominance, while the army is now infested with rebellious generals which are advocting for the end of our oligarchy. In the south, conflicts between settlers, religious fanatics and landowners have resulted in a guerilla warfare which is taking more time than expected to put down. We must resolve those issues quickly or find compromises with the opposition or our days are counted."
 brazil_events.1.a:0 "We'll see what we can do ..."

 lower_strata_nerf:0 "Lower Strata Nerf"
 lower_strata_nerf_desc:0 "A sol nerf for the lower strata for balancing purposes."
 coronelist_infighting:0 "Coronelist Infighting"
 coronelist_infighting_desc:0 "The landowners of different regions are fighting for dominance, hindering their overhaul power againt the opposition."
 contestado_turmoil:0 "Contestado Uprising"
 contestado_turmoil_desc:0 "A conflict has erupted in this region between between settlers, religious fanatics and landowners."

 brazil_events.5.t:0 "The Monarchist Movement"
 brazil_events.5.d:0 "A petition has been received by the government demanding the return of the Orleans-Braganza family. Shall we accept ?"
 brazil_events.5.f:0 "The Empire, which lasted 67 years, has not caused any major issues when it felt in 1889. The transition was rather peacefull, but the royal family was exiled to ensure more stability for then new republic. Now that time has passed, it is time that we agree for the return of the royal family on their homeland. This will statisfy the royalists and allow us to secure their support in those trouble times."
 brazil_events.5.a:0 "They can return."
 brazil_events.5.b:0 "No way !"

 allow_royal_family_return:0 "Allowed Royal Family Return"
 allow_royal_family_return_desc:0 "The government has agreed for the return of the Orleans-Braganza family to Brazil, satisfy the traditionalist factions."
 disallowed_royal_family_return:0 "Disallowed Royal Family Return"
 disallowed_royal_family_return_desc:0 "The government has forbid the return of the Orleans-Braganza family to Brazil, angering the traditionalist factions."

 ideology_tenentist:0 "Tenetist"
 ideology_tenentist_desc:0 "A modernist and authoritarian movement contesting the landowners' oligarchy power."
 ideology_coronelist:0 "Coronelist"
 ideology_coronelist_desc:0 "A landowners' favoring dictatorship which relies on locally dominant oligarchs, known as coronels."