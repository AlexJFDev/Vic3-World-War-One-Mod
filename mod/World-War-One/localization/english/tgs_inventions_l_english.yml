l_english:

 #Production

 synthetic_polymers: "Synthetic Polymers"
 synthetic_polymers_desc: "The synthetic production of oil and rubber allows our modern industries to keep running even if we dont have acces to those ressources."
 advanced_oil_extraction: "Advanced Oil Extraction"
 advanced_oil_extraction_desc: "New methods like horizontal drilling, fracking and safer gas extraction that improves the oil industry production."
 molecular_biology: "Molecular Biology"
 molecular_biology_desc: "A branch of biology that seeks to understand the molecular structures and chemical processes that are the basis of biological activity within and between cells."
 modern_appliances: "Modern Appliances"
 modern_appliances_desc: "A set of machines which assists in household functions such as cooking, cleaning and food preservation."
 mechanical_computing_tech: "Mechanical Computing"
 mechanical_computing_tech_desc: "Modern machines capable of advanced differential analysis will radically help our researches and war organization efforts."
 modern_physics: "Modern Physics"
 modern_physics_desc: "A branch of physics including quantum mechanics, special relativity and general relativity."
 transistor: "Transistor"
 transistor_desc: "A semiconductor device used to amplify electrical signals and power."
 television: "Televisions"
 television_desc: "Modern visual broadcasting devices that conveys entertainment and news content for households."
 nuclear_weapons: "Nuclear Weapons"
 nuclear_weapons_desc: "Explosive devices that derives their massive destructive force from nuclear manipulation."
 satellites: "Satellites"
 satellites_desc: "A spacecraft placed into orbit around a celestial body with variety of uses, including communication relay, weather forecasting, navigation, broadcasting, scientific research and reconnaissance."

 #Military

 aerial_ground_support: "Aerial Ground Support"
 aerial_ground_support_desc: "Detailed air-ground communications allows our aircrafts to conduct swift and precise strikes against hostile ground targets."
 aerial_bombardment: "Aerial Bombardment"
 aerial_bombardment_desc: "New aircraft designs which allows them to carry a large load of bombs ready to be dropped on ennemy units and structures with devastating effects."
 amphibious_vehicles: "Amphibious Vehicles"
 amphibious_vehicles_desc: "Armored vehicle that works both on land and on or under water."
 blitzkrieg_tech: "Blitzkrieg"
 blitzkrieg_tech_desc: "A rapid and surprise attack based on the coordination between armored, artillery, infantry and air units."
 fire_fighting_drills: "Fire Fighting Drills"
 fire_fighting_drills_desc: "Every member of a ship's crew, from the Captain down to the simple sailor, must be able to help in containing and fighting fires onboard the ship."
 smoke_generator: "Smoke Generator"
 smoke_generator_desc: "Some minor modifications to the engines and smokestacks of light and medium ships allow them to make a lot of smoke to avoid or break contact with the enemy."
 passive_sonar: "Naval Radar"
 passive_sonar_desc: "A set of hydrophones which allows to spot ennemy ships more efficiently."
 jet_fighters: "Jet Fighters"
 jet_fighters_desc: "Very fast warplanes that can take on multiple regular fighters with ease, assuring air superiority to their owners."

 #Society

 technocracy: "Technocracy"
 technocracy_desc: "A modern political ideology which favor the rule of the most capabable individuals based on their technical expertise and background."
 popular_art: "Popular Art"
 popular_art_desc: "The generally recognized artistic movements dominant or prevalent in a society."
 star_system: "Star System"
 star_system_desc: "The process of marketing an art product by capitalizing on a celebrity's popularity."
 internationalism: "Internationalism"
 internationalism_desc: "A movement that advocates for greater political or economic cooperation among states and nations."
 modern_urban_planning: "Modern Urban Planning"
 modern_urban_planning_desc: "The process of designing and organizing urban spaces to create functional, sustainable, and livable environments, considering factors such as transportation, land use, and community needs."
 market_studies: "Market Studies"
 market_studies_desc: "Enhance economic understanding and strategic decision-making achieved by investing in comprehensive studies of the consumers' habits."
 inflation_linked_bonds: "Inflation-linked Bonds"
 inflation_linked_bonds_desc: "Government bonds that are protected against currency depreciation."
 modern_statistics: "Modern Statistics"
 modern_statistics_desc: "Developments of scientific and bureaucratic methods allowing more precises tracking of the population and the economy."