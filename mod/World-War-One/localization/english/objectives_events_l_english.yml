l_english:

 objectives_events.1.t:0 "Victory !"
 objectives_events.1.d:0 "Our country has managed to raise to the top ! The future is bright !"
 objectives_events.1.f:0 "In those deeply troubled times, we were facing many challenges, which many thought unbearable. Despite the odds, our country is now shinning like never, ready to spread our virtous civilization in every corner of the world. No one can oppose us now ! It is time for our era !"
 objectives_events.1.a:0 "Hurra !"

