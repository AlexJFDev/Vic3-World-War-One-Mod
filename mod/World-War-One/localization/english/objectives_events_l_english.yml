 je_usa_victory:0 "The American Hegemon"
 je_usa_victory_reason:0 "Our nation is strong, but has not reached hegemony yet. To succeed, we will have to significantly grow our economy and military. Many ruthless opponents will do everything they can to put us down. Only then we will have the keys to trully make our nation shine throughout the whole word."

