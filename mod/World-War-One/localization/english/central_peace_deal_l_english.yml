l_english:
 
 central_peace_deal.1.t:0 "Western Europe is ours !"
 central_peace_deal.1.d:0 "Victory is ours at last ! We can now move on and focus on the other fronts."
 central_peace_deal.1.f:0 "We have invested a tremendous amount of effort, and it has paid : Western Europe has fallen to our might ! We can now focus on the remaining ennemies, our propose a peace deal in our favor."
 central_peace_deal.1.a:0 "Finally !"

 central_peace_deal.2.t:0 "Eastern Europe is Ours !"
 central_peace_deal.2.d:0 "Victory is ours at last ! We can now move on and focus on the other fronts."
 central_peace_deal.2.f:0 "We have invested a tremendous amount of effort, and it has paid : Eastern Europe has fallen to our might ! We can now focus on the remaining ennemies, our propose a peace deal in our favor."
 central_peace_deal.2.a:0 "Finally !"

 central_peace_deal.3.t:0 "The British Empire has Fallen !"
 central_peace_deal.3.d:0 "Victory is ours at last ! We can now move on and focus on the other fronts."
 central_peace_deal.3.f:0 "We have invested a tremendous amount of effort, and it has paid : The British Empire is no more ! We can now focus on the remaining ennemies, our propose a peace deal in our favor."
 central_peace_deal.3.a:0 "Our domination is complete !"

 central_peace_deal.4.t:0 "The Central Powers Are Victorious !"
 central_peace_deal.4.d:0 "Berlin has authorized state transfers following our victory."
 central_peace_deal.4.f:0 "Following Germany's victory and our participation in the war, Berlin has authorized the transfer of states to our nation. We will have to subjugate and integrate those territories."
 central_peace_deal.4.a:0 "Our reward !"

 central_peace_deal.5.t:0 "The Central Powers Are Victorious !"
 central_peace_deal.5.d:0 "Berlin has authorized state transfers following our victory."
 central_peace_deal.5.f:0 "Following Germany's victory and our participation in the war, Berlin has authorized the transfer of states to our nation. We will have to subjugate and integrate those territories."
 central_peace_deal.5.a:0 "Our reward !"
 
 central_peace_deal.6.t:0 "Is It Time for Peace ?"
 central_peace_deal.6.d:0 "As France is out of the war, we can propose a white peace to London so that we can finish this bloody war early."
 central_peace_deal.6.f:0 "We have emerged victorious through our hardships, but now comes the question of peace. If we continue the war, we can gain even more rewards, but it is unlikely our people will support a continuation of the war. It is more reasonable if we consolidate our gains for now and reach a white peace with Great-Britain. If nescessary, we could strike later on when we are more ready for another demanding conflict."
 central_peace_deal.6.a:0 "Send the proposition."
 central_peace_deal.6.b:0 "We have to keep up the fight !"

 central_peace_deal.7.t:0 "Is It Time for Peace ?"
 central_peace_deal.7.d:0 "As France is out of the war, Berlin has proposed a white peace, so that we can finish this bloody war early."
 central_peace_deal.7.f:0 "We have a lost a very important ally, and now comes the question of peace. If we continue the war, we can gain turn the tides and prevent the emergence of a German hegemon, but it is unlikely our people will support a continuation of the war. It is more reasonable if we protect our territories for now and reach a white peace with Germany. If nescessary, we could strike later on when we are more ready for another demanding conflict."
 central_peace_deal.7.a:0 "Sign the peace treaty."
 central_peace_deal.7.b:0 "We have to keep up the fight !"

 je_central_peace_deal_round_1:0 "Central Peace Deal : France's surrender"
 je_central_peace_deal_round_1_name:0 "Central Peace Deal : France's surrender"
 je_central_peace_deal_round_1_reason:0 "It is finally time to impose a new world order that Germany will lead. For too long we have a complied with British Imperialism and their complices. Our armies are prepared to launch swift attacks on all fronts, whose plans have been layed down and studied extensively. With can advance with confindence and defeat our ennemies one by one untill there is none."

