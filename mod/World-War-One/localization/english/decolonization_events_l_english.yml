l_english:

 decolonization_events.1.t:0 "The Decolonial Movement"
 decolonization_events.1.d:0 "Colonies over the world are demanding auto-determination. How are we gonna deal with this situation ?"
 decolonization_events.1.f:0 "The world is changing fast. Old empires are fading, and their colonies are slowly breaking free. Every nations are expressing their self-determination, but the clash with their wounded overlords can either be pacific or bloody. We must be ready to deal with this consequent change that will reshape the world over the next decades."
 decolonization_events.1.a:0 "We'll see what we can do ..."

