 decolonization_buff:0 "Decolonial Movement"
 decolonization_buff_desc:0 "Subjects are rising up for the auto-determination, directly challenging their overlords."

 decolonization_events.6.t:0 "The Algerian Indepandance Movement"
 decolonization_events.6.d:0 "Uprising are erupting in all regions of Algeria. We must react fast otherwise the fire will spread !"
 decolonization_events.6.f:0 "Submited since 1830, Algeria has sinced then been fully incorporated into a french department. As they witnessed our defeat against the germans, Algerians rebels think we are weak. But they are underestimating us, and will soon submit under our rule again. However, even among our politicians and civil society there are dissident voices that think we should abandon Algeria. What should be done ?"
 decolonization_events.6.a:0 "We must supress this uprising !"
 decolonization_events.6.b:0 "Grant them a vassal state."
 decolonization_events.6.c:0 "We have to leave Algeria."

 algerian_independance_war:0 "Algerian Independance Movement"
 algerian_independance_war_desc:0 "Algerians are rising up to demand and/or fight for their auto-determination."

 decolonization_events.7.t:0 "The Decolonial Movement"
 decolonization_events.7.d:0 "Syria is demanding that we grant them their independance. The global movement has now reached our colony, and there is not much we can do without a bloodshed. What should we do ?"
 decolonization_events.7.f:0 "We must come to the bitter realization that the time of colonies is over. Trying to resist and keep those territories under our rule will only heaten the situation even more and cause more endless wars. It is better to let go and focus on our homeland. We can still maintain our influence in the world and ensure our prosperity via other means."
 decolonization_events.7.a:0 "Grant them independance."
 decolonization_events.7.b:0 "They are not ready for auto-determination."

