 #Political Movements

 movement_pacifist_name: "Pacifist Movement"

 #TGS Labor Rights

 law_limited_work_hours: "Limited Work Hours"
 law_limited_work_hours_desc: "The state makes sure the employers respect the legal limited work hours and pay the overtimes."

 #BPM Centralization

 lawgroup_centralization:0 "Centralization"
 lawgroup_centralization_desc:0 "Laws that dictate the power balance between the central government and regional governments."
 law_unitary:0 "Unitary"
 law_unitary_desc:0 "The central state has the monopole over every aspect of the country’s organization."
 law_devolved:0 "Devolved"
 law_devolved_desc:0 "The central states hold the power, but delegates some of the decision making and organization to the regional entities."
 law_federated:0 "Federated"
 law_federated_desc:0 "The regional entities are granted the right to decide most of their legislation. The federal state holds the executive powers, but must rules with the regions’ approbation."
 law_confederated:0 "Confederated"
 law_confederated_desc:0 "The country is bounded by the union of regional and independent political states. The central state only manages the essential policies of the union."
 law_ad_hoc_centralization:0 "Patchwork Governance"
 law_ad_hoc_centralization_desc:0 "This polity's administration has an inconsistent, sometimes contradictory set of policies regarding the autonomy and privileges of various regions."

 #TGS Military Governance

 lawgroup_military_governance:0 "Military Governance"
 lawgroup_military_governance_desc:0 "Laws that dictate how independant is the general staff from the government."
 law_subordinate_general_staff:0 "Subordinate General Staff"
 law_subordinate_general_staff_desc:0 "The general staff operates under the surveillance and rule of the government."
 law_independant_general_staff:0 "Independent General Staff"
 law_independant_general_staff_desc:0 "The general staff operates and can launch operations independantly from the government's will."
 law_military_oversight:0 "Military Oversight of Government"
 law_military_oversight_desc:0 "The general staff approves or reject the nominations of ministers."

 #TGS Surveillance

 lawgroup_surveillance:0 "Surveillance"
 lawgroup_surveillance_desc:0 "Laws that regulates the intelligence agencies. They are tasked to protect and extend the powers of the state locally and abroad."
 law_no_agencies:0 "No Agencies"
 law_no_agencies_desc:0 "The State relies only on it's police and home affairs means to deal with foreign and internal threats."
 law_foreign_counterintelligence:0 "Foreign Counter-Intelligence"
 law_foreign_counterintelligence_desc:0 "Intelligence agencies mainly focuses on foreign threats and the extension of the State's influence abroad."
 law_surveillance_state:0 "Surveillance State"
 law_surveillance_state_desc:0 "Intelligence agencies are allowed to operate both locally and abroad, to the expense of civil liberties."

 #TGS Foreign Policy

 lawgroup_foreign_policy:0 "Foreign Policy"
 lawgroup_foreign_policy_desc:0 "Laws dictating how the state can operate on the international stage."
 law_true_neutrality:0 "True Neutrality"
 law_true_neutrality_desc:0 "The state tries it's best to stay away from international affairs."
 law_armed_neutrality:0 "Armed Neutrality"
 law_armed_neutrality_desc:0 "The state tries it's best to stay away from international affairs, but retain some legal means to intervene if nescessary."
 law_limited_interventionism:0 "Limited Interventionism"
 law_limited_interventionism_desc:0 "Foreign interventionsim is allowed, but within a limited scope."
 law_expansionism:0 "Expansionism"
 law_expansionism_desc:0 "The state has no legal limitations to it's expansion."
 law_imperialism:0 "Imperialism"
 law_imperialism_desc:0 "It's the natural right of the state to expand globally, to the expense of international relations."