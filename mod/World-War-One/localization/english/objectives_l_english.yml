l_english:
    
    objective_usa:0 "The United States of America"
    objective_usa_desc:0 "The union of 1776 has managed to rise quickly to the richest economy in the world by abiding to the principle of liberalism. The USA is now the best candidate to become the next superpower, but its civil society and politicians still prefer to limit its influence to the American continent for now. To extend the American hegemony, a change of course needs to be taken, either by convincing, or by being forced to."
    objective_usa_name_USA:0 "The United States of America"
    objective_usa_desc_USA:0 "The union of 1776 has managed to rise quickly to the richest economy in the world by abiding to the principle of liberalism. The USA is now the best candidate to become the next superpower, but its civil society and politicians still prefer to limit its influence to the American continent for now. To extend the American hegemony, a change of course needs to be taken, either by convincing, or by being forced to."

    objective_gbr:0 "The British Empire"
    objective_gbr_desc:0 "With the death of Her Majesty Queen Victoria in 1901, the Victorian era is rapidly fading into memory. The United Kingdom has made good use of the last century, solidifying an empire stretching from Johannesburg, to Cairo, to Hong Kong and Ottawa. Yet rising tensions on the old continent threaten to tear everything down. Will Britannia find herself embroiled in a new European war or sit this one out?"
    objective_gbr_name_GBR:0 "The British Empire"
    objective_gbr_desc_GBR:0 "With the death of Her Majesty Queen Victoria in 1901, the Victorian era is rapidly fading into memory. The United Kingdom has made good use of the last century, solidifying an empire stretching from Johannesburg, to Cairo, to Hong Kong and Ottawa. Yet rising tensions on the old continent threaten to tear everything down. Will Britannia find herself embroiled in a new European war or sit this one out ?"

    objective_ger:0 "The German Empire"
    objective_ger_desc:0 "Germany’s rise to power is threatening many, especially since the forced retirement of Bismarck in 1890. The empire managed to peacefully get new territories in Africa after the Agadir crisis of 1911, but the military command, practically a state within the state, thinks the Empire needs to truly show its army’s capabilities soon."
    objective_ger_name_GER:0 "German Empire"
    objective_ger_desc_GER:0 "Germany’s rise to power is threathening many, especially since the forced retirement of Bismarck in 1890. The empire managed to peacefully get new territories in Africa after the Agadir crisis of 1911, but the military command, practically a state within the state, thinks the Empire needs to truly show its army’s capabilities."

    objective_rus:0 "The Russian Empire"
    objective_rus_desc:0 "Russia has been in a long agony since its defeat in 1856. Politically strained and behind in terms of industrialisation, the empire needs to move forward quickly or it will face desolation. Emperor Nicholas II is ready to push for industrialisation, but refuses any concrete political reforms, even if it contributes to its unpopularity."
    objective_rus_name_RUS:0 "The Russian Empire"
    objective_rus_desc_RUS:0 "Russia has been in a long agony since its defeat in 1856. Politically strained and behind in terms of industrialisation, the empire needs to move forward quickly, or it will face desolation. Emperor Nicholas II, is ready to push for industrialisation, but refuses any concrete political reforms, even if it contributes to its unpopularity."

    objective_jap:0 "The Empire of Japan"
    objective_jap_desc:0 "Japan has managed to become the equal of western powers in terms of politics, military and economy, but remains victims of their racism. To truly be accepted, the path of militarization or democratization is necessary, maybe even both. With the unity provided by the continuous Yamamoto dynasty, the Japanese people can walk into any direction with confidence."
