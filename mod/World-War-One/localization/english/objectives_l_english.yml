    objective_jap_desc_JAP:0 "Japan has managed to become the equal of western powers in terms of politics, military and economy, but remains victims of their racism. To truly be accepted, the path of militarization or democratization is necessary, maybe even both. With the unity provided by the continuous Yamamoto dynasty, the Japanese people can walk into any direction with confidence."

