 egypt_events.8.d:0 "The fanatical movement has now gathered enough influence to reach our political sphere. Should we ban it ?"
 egypt_events.8.f:0 "Founded in march 1928 in Egypt, the brotherhood, through charitable and educational work, has managed to become prominent within our population. With high ambitions, they advocate for the rigorious following of the Sharia in all aspects of life. If we allow them, it will surely continue to grow, perhaps even beyond our control. If we ban them, it will anger their followers."
 egypt_events.8.a:0 "We must contain this movement."
 egypt_events.8.b:0 "They can continue their work."

 muslim_brotherhood_home:0 "Home of The Muslim Brotherhood"
 muslim_brotherhood_home_desc:0 "The radical zealot movement started there and is now well implemented."
 muslim_brotherhood_authorized:0 "Authorized Muslim Brotherhood"
 muslim_brotherhood_authorized_desc:0 "The religious movement is authorized in this country."
 muslim_brotherhood_banned:0 "Contained Muslim Brotherhood"
 muslim_brotherhood_banned_desc:0 "The religious movement is banned in this country."

 egypt_events.9.t:0 "The Matter of Emperor Iyasu"
 egypt_events.9.d:0 "Our monarch is drifting towards islam everyday. If we dont intervene now, we will soon be the victim of a muslim takeover !"
 egypt_events.9.f:0 "Evidences are proving that Emperor Iyasu is increasingly moving towards Islam. His proximity and appointment of muslim businessman Abdullahi Sadiq as governor, his travel to Harar's Mosque and now is obession with wearing islamic turbans are worrying our elites. It is time to take action and depose the Emperor, as he is not fullfilling his duty as head of the Eastern Orthodox faith. What should be done ?"
 egypt_events.9.a:0 "He must be deposed."
 egypt_events.9.b:0 "It's his choice."
 egypt_events.9.c:0 "Ethiopia must embrace Islam."