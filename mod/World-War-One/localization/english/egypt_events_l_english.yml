l_english:

 ideology_islamic_modernist:0 "Islamic Modernist"
 ideology_islamic_modernist_desc:0 "A reformist movement advocating for the modernisation of Islam through liberalism and mass education."

 je_british_occupation:0 "British Occupation"
 je_british_occupation_reason:0 "The british lion has layed it's claws on our homeland since our defeat in 1882, but egyptians are not accepting this subjugation. Our civilization trace back it's roots from 3150 BCE, fuelling a great sense of nationalism within the people and elites. London is aware of that, and getting worried. They might squeeze us if we try to resist even more, but the will of the people is difficult to ignore."
 je_british_occupation_desc:0 "The british lion has layed it's claws on our homeland since our defeat in 1882, but egyptians are not accepting this subjugation. Our civilization trace back it's roots from 3150 BCE, fuelling a great sense of nationalism within the people and elites. London is aware of that, and getting worried. They might squeeze us if we try to resist even more, but the will of the people is difficult to ignore."

 egyptian_nationalism:0 "Egyptian Nationalism"
 egyptian_nationalism_desc:0 "A very old civilization will not submit easily. Egypt is fueled by nationalist movements, making relations with London complicated."

 egypt_events.1.t:0 "The Matter of Egypt"
 egypt_events.1.d:0 "Egypt could get closer to the Turks if we dont intervene. We could install a more reliable ruler instead."
 egypt_events.1.f:0 "Khedive Abbas Helmy is deemed unreliable by our agents in Cairo. They fear that he could find a common cause with the Ottoman Empire and side with them. Although those are only mere speculations, it is better to intervene now and avoid a catastrophic situation for the suez canal rather than waiting for it to happen. Installing the pretender Hussein Kamel is the assurance that we can keep control of Egypt while the war is ongoing. There is however a risk that the situation backfires and the Khedive tries to stay in power. Should we proceed ?"
 egypt_events.1.a:0 "Depose the Khedivate."
 egypt_events.1.b:0 "Let's not risk it."

 egypt_events.2.t:0 "London is Deposing our Khedive !"
 egypt_events.2.d:0 "The british have deemed our Khedive to be unreliable and are proceding to a coup. Shall we let them do so or fight back ?"
 egypt_events.2.f:0 "Our overlords are currently proceding to the overthrowing of our Khedive Abbas Helmy! Due to their military presence and their infiltration in our goverment, they can easily proceed within hours if we dont react very quickly! If we call for resistance, the people will surely support us! The only issue we will be facing is the military, as we can get rid of the british officiers, but our army will take some time to reorganize after their ousting."
 egypt_events.2.a:0 "It's probably already too late ..."
 egypt_events.2.b:0 "They have gone too far this time !"

 egypt_events.3.t:0 "Egyptian Nationalism Is Growing"
 egypt_events.3.d:0 "The political and popular scene in Cairo just keeps on boiling no matter what we do. The leader of the Wafd party should be jailed to make an exemple."
 egypt_events.3.f:0 "Over the years, Cairo has become the center of the intellectual islamic world. Concepts like the Nahda have now become widespread and transformed those societies. The islamic world has now entered in it's Enlightenment age, bringing with it lot's of turmoils. Egyptian nationalism just keeps on expanding. The nationalist and liberal Wafd party, created by Saad Zaghloul, is political threat that could overcome the Sultan. This needs to stop before we loose control of the situation. We should arrest this agitator and ban his party."
 egypt_events.3.a:0 "He must be stopped."
 egypt_events.3.b:0 "Let's not risk it."

 egypt_events.4.t:0 "Egyptian Nationalism Worries London"
 egypt_events.4.d:0 "Our independance movements are making it to the cover of British newspapers. The leader of the Wafd party is being accused of instilling those agitations and is being prosecuted. Should we help him ?"
 egypt_events.4.f:0 "The prominent nationalist leader Saad Zaghloul drew the ire of the British Empire, which is now demanding his jailing while the situation calms down. While it is a beloved figure for the egyptian people, and has not commited any crimes, we cannot do much to help him without greatly angering London. If we were to oppose this decision, the consequences will be severe, and we will have to take arms. On the contrary, jailing sir Zaghloul will only cause more turmoil in our streets, which are already boiling."
 egypt_events.4.a:0 "We have to comply ..."
 egypt_events.4.b:0 "They have gone too far this time !"

 egypt_events.5.t:0 "The Egyptian Revolution"
 egypt_events.5.d:0 "Nationalist protestors are taking on the street and defying the british occupation ! Should we support them ?"
 egypt_events.5.f:0 "Anger has become widespread withing the egyptian population following the arrestation of Saad Zaghloul. The situation is becoming more and more tense between the protestors and the british military. We must issue a statement quickly or chaos will ensure. We could calm down the situation and see how London respond, or fuel it and take this opportunity to take arms and fight for our independance."
 egypt_events.5.a:0 "Calm down the situation and negotiate with London."
 egypt_events.5.b:0 "It's time for Egypt to rise up !"

 egypt_events.6.t:0 "The Egyptian Revolution"
 egypt_events.6.d:0 "The Khedive has asked for restrain and our forces have repressed the uprising. Although the situation has calmed down, nationalist sentiments are still well present. Shall we grant independance to Egypt ?"
 egypt_events.6.f:0 "Our rule in Egypt is difficult but still enduring. However we cannot deny that the popular opposition is not vanishing. On the contrary, egyptians are increasingly defying our protectorate. We could stop wasting money in enforcing our will there, leave the country and keep our troops in Suez. Then our precious canal would be encircled and at the mercy of Cairo's ambitions. We could also declare the independance of Egypt in name only and see where it leads us. Lastly, we could renegotiate a new treaty that would grant independance to Egypt, while we retain many privileges there, including military acces, trade privileges, an investment agreement and the establishment of an embassy for the Commonwhealth in Cairo."
 egypt_events.6.a:0 "We grant them independance but retain some privileges."
 egypt_events.6.b:0 "It's time to leave Egypt altogether."
 egypt_events.6.c:0 "The Empire cannot accept secessions !"

 egyptian_revolution:0 "Egyptian Revolution"
 egyptian_revolution_desc:0 "The uprising of 1919 has been repressed, but it's memory and anger shall live on the people's mind for a long time."

 oppresive_overlord:0 "Oppresive Overlord"
 oppresive_overlord_desc:0 "This nation's overlord refuses to concede autonomy, fueling even more nationalist sentiments."

 egypt_events.7.t:0 "The Society of the Muslim Brothers"
 egypt_events.7.d:0 "The fanatical movement has now gathered enough influence to reach our political sphere. Should we ban it ?"
 egypt_events.7.f:0 "Founded in march 1928 in Ismailia, the brotherhood, through charitable and educational work, has managed to become prominent within our population. With high ambitions, they advocate for the rigorious following of the Sharia in all aspects of life. If we allow them, it will surely continue to grow, perhaps even beyond our control. If we ban them, it will anger their followers."
 egypt_events.7.a:0 "We must contain this movement."
 egypt_events.7.b:0 "They can continue their work."

